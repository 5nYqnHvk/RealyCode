# RelayCode proxy config
server:
  host: 127.0.0.1
  port: 8080
  auth_token: ""   # when non-empty, clients must send matching x-api-key / Authorization

# Incoming Claude model name -> backend route.
# "match" is checked as a case-insensitive substring of the incoming model
# name (e.g. "opus", "sonnet", "haiku"). A fallback entry with match: "*"
# is required.
routes:
  - match: "opus"
    provider: openai_responses
    model: gpt-5.5
  - match: "sonnet"
    provider: openai_responses
    model: gpt-5.4
  - match: "*"
    provider: deepseek_chat
    model: deepseek-chat

providers:
  openai_responses:
    kind: openai_responses                 # POST /v1/responses
    base_url: https://api.openai.com/v1
    api_key: "${OPENAI_API_KEY}"
    # Experimental/unsupported: maps Anthropic server tools (web_search, etc.)
    # to upstream function tools. May pollute context or break replay.
    # experimental_passthrough_server_tools: true

  openai_chat:
    kind: openai_chat                      # POST /v1/chat/completions
    base_url: https://api.openai.com/v1
    api_key: "${OPENAI_API_KEY}"

  deepseek_chat:
    kind: openai_chat
    base_url: https://api.deepseek.com/v1
    api_key: "${DEEPSEEK_API_KEY}"
